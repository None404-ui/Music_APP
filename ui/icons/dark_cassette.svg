  </g>

  <g filter="url(#thinGlow)">
    <path class="line" d="M130 366H382" stroke="#00E5FF" stroke-width="3"/>
    <path class="line" d="M160 382H352" stroke="#FF2BD6" stroke-width="3"/>
    <rect x="204" y="354" width="104" height="28" rx="12" fill="#0D0A1A" stroke="#FF7A18" stroke-width="2.5"/>
    <path class="line" d="M224 368H288" stroke="#FF7A18" stroke-width="3"/>
  </g>

  <g fill="#070611" stroke="#FDF7FF" stroke-width="2" opacity="0.95">
    <circle cx="88" cy="174" r="9"/>
    <circle cx="424" cy="174" r="9"/>
    <circle cx="88" cy="358" r="9"/>
    <circle cx="424" cy="358" r="9"/>
  </g>

  <g stroke="#B026FF" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <path d="M82 168L94 180"/>
    <path d="M94 168L82 180"/>
    <path d="M418 168L430 180"/>
    <path d="M430 168L418 180"/>
    <path d="M82 352L94 364"/>
    <path d="M94 352L82 364"/>
