<svg width="512" height="512" viewBox="40 126 432 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Classic Retro Cassette Icon</title>
  <desc id="desc">Minimal classic retro styled cassette with warm beige, orange, muted blue and red details.</desc>

  <defs>
    <linearGradient id="bodyGradient" x1="72" y1="126" x2="440" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAD8B5"/>
      <stop offset="0.48" stop-color="#D4BC8D"/>
      <stop offset="1" stop-color="#BFA273"/>
    </linearGradient>

    <linearGradient id="edgeGradient" x1="72" y1="126" x2="440" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9B4B32"/>
      <stop offset="0.36" stop-color="#3C83A6"/>
      <stop offset="0.72" stop-color="#C84A37"/>
      <stop offset="1" stop-color="#D97A2B"/>
    </linearGradient>

    <linearGradient id="labelGradient" x1="112" y1="166" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4E4C2"/>
      <stop offset="0.52" stop-color="#ECD2A0"/>
      <stop offset="1" stop-color="#E5C48C"/>
    </linearGradient>

    <radialGradient id="reelGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(176 270) rotate(90) scale(64)">
      <stop offset="0" stop-color="#FFF3D2"/>
      <stop offset="0.18" stop-color="#3C83A6"/>
      <stop offset="0.55" stop-color="#8A5B32"/>
      <stop offset="1" stop-color="#2E2B25"/>
    </radialGradient>

    <radialGradient id="reelGradientRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(336 270) rotate(90) scale(64)">
      <stop offset="0" stop-color="#FFF4D6"/>
      <stop offset="0.18" stop-color="#D97A2B"/>
      <stop offset="0.55" stop-color="#77513D"/>
      <stop offset="1" stop-color="#2E2B25"/>
    </radialGradient>

    <filter id="neonGlow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2" result="blurSoft"/>
      <feGaussianBlur stdDeviation="5" result="blurWide"/>
      <feMerge>
        <feMergeNode in="blurWide"/>
        <feMergeNode in="blurSoft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="thinGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .line {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .microcopy {
        font-family: "Arial Narrow", "DIN Condensed", Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 2.4px;
      }

      .labelcopy {
        font-family: "Arial Narrow", "DIN Condensed", Arial, sans-serif;
        font-weight: 800;
        letter-spacing: 4px;
      }
    </style>
  </defs>

  <g opacity="0.16" filter="url(#neonGlow)">
    <path class="line" d="M96 138H416C440.301 138 460 157.699 460 182V350C460 374.301 440.301 394 416 394H96C71.6995 394 52 374.301 52 350V182C52 157.699 71.6995 138 96 138Z" stroke="url(#edgeGradient)" stroke-width="6"/>
